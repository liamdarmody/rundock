name: CI

# Runs the test suite on every push to main and every pull request, so no change
# to the server (a formerly untested ~4.3k-line monolith) merges without the
# regression net passing. --omit=dev installs just the runtime deps (ws) and
# skips the heavy Electron build toolchain; the editor round-trip suite runs
# the real Tiptap editor under jsdom, which is installed individually (pinned
# to the lockfile version) rather than pulling all devDependencies. Matrix
# covers the shipping Node (.nvmrc = 22, the packaged Electron runtime's Node
# line, and the floor for node:sqlite-backed search) and the dev runtime (24).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, dependency-free guard: no internal run codenames, review-round or
  # priority labels, or private workspace paths leak into the public source.
  hygiene:
    name: Hygiene (no internal references)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Check for internal references
        run: node scripts/check-internal-refs.js

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Install test-only DOM dependency
        # The editor round-trip suite boots the real editor under jsdom.
        # Version must match package.json/package-lock.json.
        run: npm install --no-save jsdom@29.1.1

      - name: Run tests
        run: npm test

  # E2E smoke suite (browser-driven, Playwright). Protects the client layer
  # the Node suite cannot observe: named regression tests for the two
  # escaped bugs (anchor re-flash, nav-state desync) plus palette golden
  # paths, and it measures public/app.js line coverage via V8.
  #
  # Promoted to BLOCKING 2026-07-14 (owner-approved, ahead of the planned
  # 2026-07-27 soak end): flake-free through the entire soak including ~15
  # runs on release day, and it pins three real escaped bugs (anchor
  # re-flash, nav-state desync, palette focus ring). ~20s runtime.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies (incl. dev, for Playwright)
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Report client coverage
        if: always()
        run: |
          if [ -f test-results/coverage-client.lcov ]; then
            echo "client lcov written: test-results/coverage-client.lcov"
            grep -E "^(LF|LH):" test-results/coverage-client.lcov
          fi
