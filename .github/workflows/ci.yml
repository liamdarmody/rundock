name: CI

# Runs the test suite on every push to main and every pull request, so no change
# to the server (a formerly untested ~4.3k-line monolith) merges without the
# regression net passing. The suite is Node built-ins only (node:test/assert);
# --omit=dev installs just the runtime deps it needs (ws) and skips the heavy
# Electron build toolchain. Matrix covers the shipping Node (.nvmrc = 20) and the
# current dev runtime (24).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Run tests
        run: npm test

  # E2E smoke suite (browser-driven, Playwright). Protects the client layer
  # the Node suite cannot observe: named regression tests for the two SR1
  # escaped bugs (anchor re-flash, nav-state desync) plus palette golden
  # paths, and it measures public/app.js line coverage via V8.
  #
  # SOAK PERIOD: continue-on-error until 2026-07-27 (two weeks from landing,
  # per Client-Test-Coverage-Spec). If the job has been flake-free by then,
  # remove continue-on-error so it gates alongside the Node suite.
  e2e:
    name: E2E smoke (soaking, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies (incl. dev, for Playwright)
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Report client coverage
        if: always()
        run: |
          if [ -f test-results/coverage-client.lcov ]; then
            echo "client lcov written: test-results/coverage-client.lcov"
            grep -E "^(LF|LH):" test-results/coverage-client.lcov
          fi
