name: Release

# Builds, signs, notarises, and publishes Rundock when a version tag is pushed.
# electron-builder uploads to a GitHub release for the tag; by default the GitHub
# provider creates that release as a DRAFT, so artefacts land for review and are
# promoted to a public release manually (validate the draft first, then publish).
#
# Phase A scope: macOS (arm64 + x64) only. The windows and linux jobs below are
# scaffolded but inactive, activated later by their platform cards.
#
# Required repo secrets (documented in the maintainer's release-setup notes):
#   CSC_LINK            base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD    password for that .p12
#   APPLE_API_KEY_P8    base64 of the App Store Connect .p8 key
#   APPLE_API_KEY_ID    App Store Connect key id
#   APPLE_API_ISSUER    App Store Connect issuer id
#   APPLE_TEAM_ID       Apple Developer team id

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Gate the whole release on the test suite: a tag must never ship a red build.
  # Mirrors the CI workflow but pinned to the shipping Node (.nvmrc).
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install runtime dependencies
        run: npm ci --omit=dev
      - name: Install jsdom for the editor suite
        # The editor round-trip suite boots the real editor under jsdom, a
        # devDependency the lean install omits. Same pinned install as CI;
        # without it the gate fails on ERR_MODULE_NOT_FOUND.
        run: npm install --no-save jsdom@29.1.1
      - name: Run tests
        run: npm test

  # Browser-driven suite gates the release alongside the Node suite: a tag
  # must never ship a broken client. Mirrors the CI e2e job.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install dependencies (incl. dev, for Playwright)
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite
        run: npx playwright test

  macos:
    name: Build macOS (arm64 + x64)
    needs: [test, e2e]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Decode App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build, sign, notarise, publish
        # Version comes from the tag (v1.2.3 -> 1.2.3) and overrides package.json,
        # so the built artefacts and the published release always match the tag.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION from tag $GITHUB_REF_NAME"
          npx electron-builder --mac --universal \
            -c.mac.notarize=true \
            -c.extraMetadata.version="$VERSION" \
            --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_KEY (path to the decoded .p8) is exported via GITHUB_ENV above.

  # ---------------------------------------------------------------------------
  # Windows build. Unsigned for v1 (no code-signing secrets); users click through
  # the one-time SmartScreen prompt. Builds an NSIS installer + portable .exe.
  # ---------------------------------------------------------------------------
  windows:
    name: Build Windows (x64)
    needs: [test, e2e]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        # Use bash (available on Windows runners) so version extraction matches macOS.
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building Windows version $VERSION from tag $GITHUB_REF_NAME"
          npx electron-builder --win -c.extraMetadata.version="$VERSION" --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # SCAFFOLDED, INACTIVE. Reserved for future Linux support.
  # ---------------------------------------------------------------------------
