name: Release

# Builds, signs, notarises, and publishes Rundock when a version tag is pushed.
# electron-builder uploads to a GitHub release for the tag; by default the GitHub
# provider creates that release as a DRAFT, so artefacts land for review and are
# promoted to a public release manually (validate the draft first, then publish).
#
# Phase A scope: macOS (arm64 + x64) only. The windows and linux jobs below are
# scaffolded but inactive, activated later by their platform cards.
#
# Required repo secrets (see 02_Areas/Rundock/CI-Release-Setup.md in the vault):
#   CSC_LINK            base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD    password for that .p12
#   APPLE_API_KEY_P8    base64 of the App Store Connect .p8 key
#   APPLE_API_KEY_ID    App Store Connect key id
#   APPLE_API_ISSUER    App Store Connect issuer id
#   APPLE_TEAM_ID       Apple Developer team id

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Decode App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build, sign, notarise, publish
        # Version comes from the tag (v1.2.3 -> 1.2.3) and overrides package.json,
        # so the built artefacts and the published release always match the tag.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION from tag $GITHUB_REF_NAME"
          npx electron-builder --mac --arm64 --x64 \
            -c.mac.notarize=true \
            -c.extraMetadata.version="$VERSION" \
            --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_KEY (path to the decoded .p8) is exported via GITHUB_ENV above.

