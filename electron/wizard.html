<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rundock Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #1A1A1A;
      color: #F0EDE8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px;
      -webkit-app-region: drag;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #9A9590;
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.5;
    }
    .status {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 32px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #212121;
      border: 1px solid #3D3D3D;
      border-radius: 8px;
    }
    .step.active {
      border-color: #E87A5A;
    }
    .step.done {
      border-color: #6BC67E;
    }
    .step-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .step-icon.pending { color: #9A9590; }
    .step-icon.active { color: #E87A5A; }
    .step-icon.done { color: #6BC67E; }
    /* Action-needed (e.g. Claude Code not installed yet): the current step,
       numbered and accented, but never a spinner. */
    .step.attention { border-color: #E87A5A; }
    .step-icon.attention { color: #E87A5A; }
    .step-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
    }
    .step-text a {
      color: #E87A5A;
      text-decoration: none;
      -webkit-app-region: no-drag;
    }
    .step-text a:hover {
      color: #F09070;
    }
    .step-text .hint {
      color: #9A9590;
      font-size: 12px;
      margin-top: 4px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #3D3D3D;
      border-top-color: #E87A5A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      -webkit-app-region: no-drag;
      background: #E87A5A;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover { background: #F09070; }
    .btn:disabled {
      background: #3D3D3D;
      color: #9A9590;
      cursor: default;
    }
    .btn-secondary {
      -webkit-app-region: no-drag;
      background: transparent;
      color: #9A9590;
      border: none;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
    }
    .btn-secondary:hover { color: #F0EDE8; }
  </style>
</head>
<body>
  <h1>Rundock Setup</h1>
  <p class="subtitle" id="subtitle">Rundock needs Claude Code to power your agent team.</p>

  <div class="status">
    <div class="step" id="step-install">
      <div class="step-icon pending" id="icon-install">1</div>
      <div class="step-text">
        <div>Install Claude Code</div>
        <div class="hint" id="install-hint"><a href="https://docs.anthropic.com/en/docs/claude-code/overview" target="_blank">Installation guide</a></div>
      </div>
    </div>
    <div class="step" id="step-auth">
      <div class="step-icon pending" id="icon-auth">2</div>
      <div class="step-text">
        <div>Sign in to Claude</div>
        <div class="hint" id="auth-hint">Click <strong>Sign in to Claude</strong> below. A terminal opens to complete the sign-in.</div>
      </div>
    </div>
    <!-- Rendered only when the Codex CLI is detected on this machine; Claude-only
         machines see the wizard exactly as before. -->
    <div class="step" id="step-codex" style="display:none">
      <div class="step-icon pending" id="icon-codex">3</div>
      <div class="step-text">
        <div>Sign in to Codex</div>
        <div class="hint" id="codex-hint">Optional. Specialists can run on your ChatGPT plan via the official Codex CLI.</div>
      </div>
    </div>
  </div>

  <button class="btn" id="btn-signin" style="display:none" onclick="signIn()">Sign in to Claude</button>
  <button class="btn" id="btn-codex-signin" style="display:none" onclick="signInCodex()">Sign in to Codex</button>
  <button class="btn" id="btn-check" onclick="checkNow()">Check again</button>
  <button class="btn-secondary" id="btn-codex-skip" style="display:none" onclick="skipCodex()">Skip for now</button>
  <button class="btn-secondary" id="btn-skip" onclick="skipAndQuit()">Quit</button>

  <script>
    let polling = null;

    // Show the platform's install command for Claude Code on every OS, and make
    // clear it is the command-line tool, not the Claude desktop app. This is the
    // common first-run stumble: the desktop app does not put `claude` on PATH,
    // so a user who has "Claude" installed still needs to install Claude Code.
    (function () {
      const plat = (window.electronAPI && window.electronAPI.platform) || '';
      // no-drag so the command is actually selectable: the window body is a drag
      // region, which would otherwise swallow the click and block select/copy.
      const code = 'background:#333;padding:2px 6px;border-radius:3px;font-size:12px;-webkit-app-region:no-drag;-webkit-user-select:all;user-select:all';
      const hint = document.getElementById('install-hint');
      if (!hint) return;
      const isWin = plat === 'win32';
      const where = isWin ? 'In PowerShell' : 'In Terminal';
      const cmd = isWin ? 'irm https://claude.ai/install.ps1 | iex' : 'curl -fsSL https://claude.ai/install.sh | bash';
      hint.innerHTML =
        'Claude Code is a command-line tool, different from the Claude desktop app. Install it and this screen continues automatically.'
        + '<br>' + where + ': <code style="' + code + '">' + cmd + '</code>'
        + (isWin ? '<br>Or WinGet: <code style="' + code + '">winget install Anthropic.ClaudeCode</code>' : '')
        + '<br><a href="https://code.claude.com/docs/en/overview" target="_blank">Installation guide</a>';
    })();

    const STEP_NUMBERS = { install: '1', auth: '2', codex: '3' };
    function updateStep(id, state) {
      const step = document.getElementById('step-' + id);
      const icon = document.getElementById('icon-' + id);
      step.className = 'step ' + state;
      icon.className = 'step-icon ' + state;
      if (state === 'done') {
        icon.innerHTML = '&#10003;';
      } else if (state === 'active') {
        icon.innerHTML = '<div class="spinner"></div>';
      } else {
        // pending / attention: show the step number, never a spinner, so a
        // not-yet-installed step never reads as endlessly "checking".
        icon.textContent = STEP_NUMBERS[id] || '';
      }
    }

    // The user can defer Codex sign-in; guidance stays available in Settings.
    let codexSkipped = false;

    // Copy rule (0.10.0 docs sweep): a ChatGPT plan is always an addition for
    // specialists, never an alternative to Claude Code, and a Codex user is
    // never told to install Claude Code without being told why it is needed.
    const BASE_SUBTITLE = 'Rundock needs Claude Code to power your agent team.';
    const CODEX_SUBTITLE = 'Your specialists can run on your ChatGPT plan via the official Codex CLI. '
      + "Rundock still needs Claude Code: it runs your team's orchestrator and Doc, your setup guide.";

    function renderCodexStep(codex, claudeReady) {
      const step = document.getElementById('step-codex');
      const hint = document.getElementById('codex-hint');
      const codexSigninBtn = document.getElementById('btn-codex-signin');
      const codexSkipBtn = document.getElementById('btn-codex-skip');
      step.style.display = codex.installed ? 'flex' : 'none';
      codexSigninBtn.style.display = 'none';
      codexSkipBtn.style.display = 'none';
      if (!codex.installed) return { pendingCodex: false };
      if (codex.authenticated) {
        updateStep('codex', 'done');
        hint.textContent = 'Signed in. Specialists can run on your ChatGPT plan.';
        return { pendingCodex: false };
      }
      if (codexSkipped) {
        updateStep('codex', 'pending');
        hint.textContent = 'Skipped. You can sign in any time from Settings.';
        return { pendingCodex: false };
      }
      if (!claudeReady) {
        updateStep('codex', 'pending');
        return { pendingCodex: false };
      }
      // Claude is ready and Codex is installed but not signed in: offer the
      // optional sign-in step now.
      updateStep('codex', 'active');
      hint.textContent = 'Optional. A terminal opens to run codex login with your ChatGPT account.';
      codexSigninBtn.style.display = 'inline-block';
      codexSkipBtn.style.display = 'inline-block';
      return { pendingCodex: true };
    }

    async function checkStatus() {
      const runtimes = await window.electronAPI.checkRuntimes();
      const result = runtimes.claude;
      const codex = runtimes.codex || { installed: false, authenticated: false };

      const signinBtn = document.getElementById('btn-signin');
      const checkBtn = document.getElementById('btn-check');

      // A Codex user waiting on the Claude steps is told why Claude Code is
      // still required rather than being handed a bare install instruction.
      document.getElementById('subtitle').textContent =
        (codex.installed && result.status !== 'ready') ? CODEX_SUBTITLE : BASE_SUBTITLE;

      if (result.status === 'not-installed') {
        // Action needed, not in progress: numbered attention state, never the
        // spinner, so it does not read as "checking" forever before install.
        updateStep('install', 'attention');
        updateStep('auth', 'pending');
        renderCodexStep(codex, false);
        // Install step: Check again is the primary action.
        signinBtn.style.display = 'none';
        checkBtn.style.display = 'inline-block';
        return false;
      }

      if (result.status === 'not-authenticated') {
        updateStep('install', 'done');
        updateStep('auth', 'active');
        renderCodexStep(codex, false);
        // Sign-in step: the Sign in button replaces Check again (single action).
        signinBtn.style.display = 'inline-block';
        checkBtn.style.display = 'none';
        return false;
      }

      if (result.status === 'ready') {
        updateStep('install', 'done');
        updateStep('auth', 'done');
        signinBtn.style.display = 'none';
        const { pendingCodex } = renderCodexStep(codex, true);
        if (pendingCodex) {
          // The optional Codex step holds the wizard open; Sign in to Codex
          // and Skip for now are the actions.
          checkBtn.style.display = 'none';
          document.getElementById('btn-skip').style.display = 'none';
          return false;
        }
        checkBtn.style.display = 'inline-block';
        checkBtn.textContent = 'Continue';
        checkBtn.onclick = () => window.electronAPI.wizardDone();
        document.getElementById('btn-skip').style.display = 'none';
        if (polling) { clearInterval(polling); polling = null; }
        return true;
      }
    }

    async function signIn() {
      const btn = document.getElementById('btn-signin');
      btn.disabled = true;
      btn.textContent = 'Opening sign-in...';
      const res = await window.electronAPI.signInClaude();
      if (res && res.ok) {
        btn.textContent = 'Waiting for sign-in...';
        const hint = document.getElementById('auth-hint');
        if (hint) hint.innerHTML =
          "A terminal opened with Claude's sign-in. Follow its prompts: press Enter when asked, "
          + "and if your browser doesn't open, copy the link it shows and open it. "
          + "This screen continues automatically once you finish.";
        // Make sure we're polling so the wizard advances the moment auth lands.
        if (!polling) polling = setInterval(checkStatus, 3000);
      } else {
        btn.disabled = false;
        btn.textContent = 'Sign in to Claude';
        const hint = document.getElementById('auth-hint');
        if (hint) hint.textContent = (res && res.error)
          ? ('Could not start sign-in: ' + res.error)
          : 'Could not start sign-in. Please try again.';
      }
    }

    async function signInCodex() {
      const btn = document.getElementById('btn-codex-signin');
      btn.disabled = true;
      btn.textContent = 'Opening sign-in...';
      const res = await window.electronAPI.signInCodex();
      const hint = document.getElementById('codex-hint');
      if (res && res.ok) {
        btn.textContent = 'Waiting for sign-in...';
        if (hint) hint.textContent =
          'A terminal opened with codex login. Sign in with your ChatGPT account; '
          + 'this screen continues automatically once you finish.';
        // Poll so the wizard advances the moment auth.json appears.
        if (!polling) polling = setInterval(checkStatus, 3000);
      } else {
        btn.disabled = false;
        btn.textContent = 'Sign in to Codex';
        if (hint) hint.textContent = (res && res.error)
          ? ('Could not start sign-in: ' + res.error)
          : 'Could not start sign-in. Please try again.';
      }
    }

    function skipCodex() {
      codexSkipped = true;
      checkStatus();
    }

    // Poll for install/auth, but do not poll forever: after ~60s still stuck on
    // the install step, stop and nudge instead of spinning silently.
    let pollCount = 0;
    async function checkNow() {
      pollCount = 0;
      const ready = await checkStatus();
      if (ready || polling) return;
      polling = setInterval(async () => {
        const done = await checkStatus();
        if (done) { clearInterval(polling); polling = null; return; }
        // Once Claude Code is detected the install step leaves the attention
        // state (it moves to sign-in); stop this install-detection poll there.
        if (!document.getElementById('step-install').classList.contains('attention')) {
          clearInterval(polling); polling = null; return;
        }
        if (++pollCount >= 20) {
          clearInterval(polling); polling = null;
          const hint = document.getElementById('install-hint');
          if (hint) hint.insertAdjacentHTML('beforeend',
            '<br><span style="color:#E8A84C">Still not detecting Claude Code. Make sure you ran the install command in the terminal (not the desktop app), then click Check again.</span>');
        }
      }, 3000);
    }

    function skipAndQuit() {
      window.close();
    }

    // Initial check on load
    checkNow();
  </script>
</body>
</html>
